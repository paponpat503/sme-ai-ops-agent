name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sme_ai_ops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_URL: postgresql+psycopg://postgres:postgres@localhost:5432/sme_ai_ops_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m compileall app scripts mcp
      - run: python -m alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/sme_ai_ops_test
      - run: python -m pytest -q
      - run: python -m scripts.run_eval
      - run: python -m scripts.run_retrieval_eval
      - run: python -m scripts.run_planner_eval
      - run: python -m scripts.run_security_eval
      - run: python -m scripts.run_mcp_smoke_test
      - run: python -m scripts.run_dashboard_smoke_test
      - run: python -m scripts.run_tool_agent_smoke_test
